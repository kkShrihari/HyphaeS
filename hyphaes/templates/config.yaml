# =============================================================================
# HyphaeS — config.yaml
# Single config for all 5 modules
# Generated by: HyphaeS init
# Paths auto-filled by: HyphaeS setup
# Warning ranges noted in comments
# =============================================================================

# ── GENERAL ───────────────────────────────────────────────────────────────────
general:
  threads: 16             # recommended: 16-144 | warning if < 8
  outdir:  results
  db_dir:  databases/     # auto-filled by HyphaeS setup

# ── MODULE 1: QUALITY CONTROL ─────────────────────────────────────────────────
mod1_QC:
  min_quality:   15       # Trim Galore Phred | warning if < 10
  min_length:    50       # min read length after trimming | warning if < 30
  phix_ref:      phix     # BBDuk built-in keyword — no file needed
  phix_k:        31       # BBDuk kmer for PhiX | do not change
  entropy:       0.6      # low-complexity filter | range: 0.5-0.7
  host_idx:      ~        # auto-filled by HyphaeS setup (GRCh38)
  eukdetect_cfg: ~        # auto-filled by HyphaeS setup

# ── MODULE 2: ASSEMBLY ────────────────────────────────────────────────────────
mod2_assembly:
  assembler:        spades
  spades_memory_gb: 500   # RAM in GB | gmbs17 has ~535 GB
  kmer:             21,33,55,77
  min_contig_len:   1000  # warning if < 500 | lower = more fungi contigs
  coverm_method:    mean  # options: mean, trimmed_mean, covered_fraction

# ── MODULE 3: TAXONOMY ────────────────────────────────────────────────────────
mod3_taxonomy:
  kraken2_db:         ~   # auto-filled by HyphaeS setup (PlusPF)
  kraken2_confidence: 0.1 # range: 0.0-1.0 | higher = more specific
  kaiju_db:           ~   # auto-filled by HyphaeS setup (nr_euk)
  kaiju_nodes:        ~   # auto-filled by HyphaeS setup
  kaiju_evalue:       0.01
  bracken_read_len:   150 # must match Kraken2 DB build read length
  bracken_level:      S   # S=species, G=genus, F=family
  bracken_threshold:  10  # min reads to report | warning if < 5

# ── MODULE 4: BINNING ─────────────────────────────────────────────────────────
mod4_binning:
  # Binning mode — choose one:
  #   ensemble  → MetaBAT2 + MaxBin2 + CONCOCT → DAS_Tool
  #   hyperbin  → HyphaeBin only (novel tool — in development)
  binning_mode:        ensemble

  # EukRep + Tiara
  eukrep_min_len:      1000
  tiara_min_len:       1000

  # MetaBAT2
  metabat2_min_len:    1500  # warning if < 1500

  # CONCOCT
  concoct_chunk:       10000
  concoct_clusters:    400   # increase for complex communities

  # DAS_Tool
  dastool_score_threshold: 0.5  # range: 0.0-1.0 | warning if < 0.3

  # MAG quality cutoffs
  min_completeness:    50    # % | warning if < 40
  max_contamination:   10    # % | warning if > 15

  # MAG taxonomy
  reference_tree:      ~     # optional: path to reference ITS tree
  reference_msa:       ~     # optional: path to reference MSA for EPA-ng

  # Augustus gene prediction
  augustus_species:    botrytis_cinerea  # fungi-trained model
  augustus_config:     ~     # auto-filled by HyphaeS setup

  # Database paths — auto-filled by HyphaeS setup
  eukcc_db:            ~
  busco_lineage:       fungi_odb10
  antismash_taxon:     fungi
  antismash_db:        ~

# ── MODULE 5: FUNCTIONAL ANNOTATION ──────────────────────────────────────────
mod5_annotation:
  # Database paths — auto-filled by HyphaeS setup
  eggnog_db:           ~
  dbcan_db:            ~
  antismash_db:        ~
  funguild_db:         ~     # FUNGuild.db path
